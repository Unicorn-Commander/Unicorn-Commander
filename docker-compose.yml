version: '3.8'

services:
  # =================================================================
  # Infrastructure
  # =================================================================

  unicorn-postgresql:
    image: postgres:16-alpine
    container_name: unicorn-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unicorn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unicorn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5432:5432"
    networks:
      - unicorn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unicorn}"]
      interval: 10s
      timeout: 5s
      retries: 5

  unicorn-redis:
    image: redis:7-alpine
    container_name: unicorn-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - unicorn-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  unicorn-keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: unicorn-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://unicorn-postgresql:5432/${POSTGRES_USER:-unicorn}
      KC_DB_USERNAME: ${POSTGRES_USER:-unicorn}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-unicorn}
    volumes:
      - ./ops-center/keycloak-theme/realm:/opt/keycloak/data/import
    ports:
      - "8080:8080"
    depends_on:
      unicorn-postgresql:
        condition: service_healthy
    networks:
      - unicorn-network

  # =================================================================
  # Ops-Center (The Colonel) — Admin Dashboard
  # =================================================================

  ops-center:
    build:
      context: ./ops-center
      dockerfile: Dockerfile
    container_name: ops-center
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      # Database
      POSTGRES_HOST: unicorn-postgresql
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-unicorn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unicorn}
      POSTGRES_DB: ${OPS_CENTER_DB:-unicorn_db}
      # Redis
      REDIS_HOST: unicorn-redis
      REDIS_PORT: 6379
      # Keycloak
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://unicorn-keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-uchub}
      KEYCLOAK_CLIENT_ID: ${OPS_CENTER_CLIENT_ID:-ops-center}
      KEYCLOAK_CLIENT_SECRET: ${OPS_CENTER_CLIENT_SECRET:-change-me}
      # Billing
      BILLING_ENABLED: ${BILLING_ENABLED:-false}
    depends_on:
      unicorn-postgresql:
        condition: service_healthy
      unicorn-redis:
        condition: service_healthy
    networks:
      - unicorn-network

  # =================================================================
  # Unicorn Brigade (The General) — Agent Orchestration
  # =================================================================

  unicorn-brigade:
    build:
      context: ./unicorn-brigade
      dockerfile: Dockerfile
    container_name: unicorn-brigade
    restart: unless-stopped
    ports:
      - "8112:8112"
    environment:
      PORT: 8112
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-unicorn}:${POSTGRES_PASSWORD:-unicorn}@unicorn-postgresql:5432/${BRIGADE_DB:-brigade_db}
      # Redis
      REDIS_URL: ${REDIS_URL:-redis://unicorn-redis:6379}
      # Ops-Center integration
      OPS_CENTER_URL: http://ops-center:8084
      OPS_CENTER_LLM_ENDPOINT: http://ops-center:8084/api/v1/llm/chat/completions
      BRIGADE_SERVICE_KEY: ${BRIGADE_SERVICE_KEY:-change-me}
      # Keycloak
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://unicorn-keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-uchub}
      KEYCLOAK_CLIENT_ID: ${BRIGADE_CLIENT_ID:-brigade}
      KEYCLOAK_CLIENT_SECRET: ${BRIGADE_CLIENT_SECRET:-change-me}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-change-me}
    depends_on:
      unicorn-postgresql:
        condition: service_healthy
      unicorn-redis:
        condition: service_healthy
      ops-center:
        condition: service_started
    networks:
      - unicorn-network

  # =================================================================
  # Brigade Frontend
  # =================================================================

  brigade-frontend:
    build:
      context: ./unicorn-brigade/frontend
      dockerfile: Dockerfile
    container_name: brigade-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - unicorn-brigade
    networks:
      - unicorn-network

  # =================================================================
  # AI Services (Optional — enable with --profile ai)
  # =================================================================

  unicorn-embeddings:
    build:
      context: ./services/embeddings
      dockerfile: Dockerfile
    container_name: unicorn-embeddings
    restart: unless-stopped
    profiles: ["ai", "embeddings"]
    ports:
      - "7997:7997"
    environment:
      MODEL_NAME: ${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v1.5}
      DEVICE: ${EMBEDDING_DEVICE:-cpu}
    networks:
      - unicorn-network

  unicorn-reranker:
    build:
      context: ./services/reranker
      dockerfile: Dockerfile
    container_name: unicorn-reranker
    restart: unless-stopped
    profiles: ["ai", "reranker"]
    ports:
      - "7998:7997"
    networks:
      - unicorn-network

  unicorn-whisperx:
    build:
      context: ./services/whisperx
      dockerfile: Dockerfile
    container_name: unicorn-whisperx
    restart: unless-stopped
    profiles: ["ai", "stt"]
    ports:
      - "9528:9528"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    networks:
      - unicorn-network

  unicorn-kokoro-tts:
    build:
      context: ./services/kokoro-tts
      dockerfile: Dockerfile
    container_name: unicorn-kokoro-tts
    restart: unless-stopped
    profiles: ["ai", "tts"]
    ports:
      - "8880:8880"
    networks:
      - unicorn-network

  unicorn-tika:
    build:
      context: ./services/tika-ocr
      dockerfile: Dockerfile
    container_name: unicorn-tika
    restart: unless-stopped
    profiles: ["ai", "ocr"]
    ports:
      - "9998:9998"
    networks:
      - unicorn-network

  unicorn-model-manager:
    build:
      context: ./services/model-manager
      dockerfile: Dockerfile
    container_name: unicorn-model-manager
    restart: unless-stopped
    profiles: ["ai", "model-manager"]
    ports:
      - "8085:8085"
    environment:
      VLLM_URL: ${VLLM_URL:-http://unicorn-vllm:8000}
    networks:
      - unicorn-network

  # =================================================================
  # Monitoring (Optional — enable with --profile monitoring)
  # =================================================================

  unicorn-prometheus:
    image: prom/prometheus:latest
    container_name: unicorn-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus-config.yml:/etc/prometheus/prometheus.yml
    networks:
      - unicorn-network

  unicorn-grafana:
    image: grafana/grafana:latest
    container_name: unicorn-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - unicorn-prometheus
    networks:
      - unicorn-network

volumes:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  unicorn-network:
    driver: bridge
