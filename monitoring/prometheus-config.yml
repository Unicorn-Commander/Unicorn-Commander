global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ops-center'
    static_configs:
      - targets: ['ops-center:8084']
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: 'litellm'
    static_configs:
      - targets: ['unicorn-litellm:4000']
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: 'traefik'
    static_configs:
      - targets: ['unicorn-traefik:8082']
    scrape_interval: 15s

  - job_name: 'llama-router'
    static_configs:
      - targets: ['unicorn-llama-router:8080']
    metrics_path: /metrics
    scrape_interval: 30s
